name: build

on:
  push:
    branches:
      - main
    tags:
      - "*-[0-9]+.*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'zulu'
          cache: 'maven'
      - name: Set up CI environment
        run: .github/setup.sh
      - name: Build zarr-java 0.1.3-SNAPSHOT from PR #71
        # zarr-java 0.1.3-SNAPSHOT is not deployed to any Maven repository
        # yet, so we build and install it into the local Maven repo before
        # the main build. Source: https://github.com/zarr-developers/zarr-java/pull/71
        run: |
          git clone --depth 1 -b attach-shaded-jar-as-classifier https://github.com/stefanhahmann/zarr-java.git "$RUNNER_TEMP/zarr-java"
          (cd "$RUNNER_TEMP/zarr-java" && mvn -B -DskipTests -Dgpg.skip=true install)
      - name: Execute the build
        run: .github/build.sh
        env:
          CENTRAL_PASS: ${{ secrets.CENTRAL_PASS }}
          CENTRAL_USER: ${{ secrets.CENTRAL_USER }}
          GPG_KEY_NAME: ${{ secrets.GPG_KEY_NAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASS: ${{ secrets.MAVEN_PASS }}
          SIGNING_ASC: ${{ secrets.SIGNING_ASC }}
